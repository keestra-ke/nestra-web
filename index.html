<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Listings</title>
    <style>
        body {
            background: url('path/to/water-animation.gif');
            background-size: cover;
            animation: ocean-breeze 10s infinite alternate;
        }

        @keyframes ocean-breeze {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .listing-card {
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .listing-card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .view-all {
            float: right;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Popular Houses <button class="view-all">View All</button></h1>
    </header>
    <main>
        <section class="listings">
            <div class="listing-card">
                <img src="https://source.unsplash.com/random/1" alt="Sunrise Block B">
                <h2>Sunrise Block B</h2>
            </div>
            <div class="listing-card">
                <img src="https://source.unsplash.com/random/2" alt="Blessed Hands">
                <h2>Blessed Hands</h2>
            </div>
            <div class="listing-card">
                <img src="https://source.unsplash.com/random/3" alt="Kayole Junction">
                <h2>Kayole Junction</h2>
            </div>
            <div class="listing-card">
                <img src="https://source.unsplash.com/random/4" alt="Baba Dogo Heights">
                <h2>Baba Dogo Heights</h2>
            </div>
        </section>
        <div class="view-toggle">
            <button>Grid View</button>
            <button>Map View</button>
        </div>
    </main>
</body>
</html>
